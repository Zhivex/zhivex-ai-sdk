name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout immutable release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.7

      - name: Verify npm supports trusted publishing
        run: >-
          node -e 'const { execFileSync } = require("node:child_process"); const version = execFileSync("npm", ["--version"], { encoding: "utf8" }).trim(); const [major, minor] = version.split(".").map(Number); if (major < 11 || (major === 11 && minor < 5)) throw new Error(`npm ${version} does not support trusted publishing; require >=11.5.1`);'

      - name: Install dependencies without lifecycle scripts
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Audit dependencies
        run: bun audit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Publish stable packages with OIDC
        if: inputs.channel == 'latest'
        run: bun run release

      - name: Publish prerelease packages with OIDC
        if: inputs.channel == 'next'
        run: bun run release:next

      - name: Push immutable package version tags
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh auth setup-git
          git push origin --tags
