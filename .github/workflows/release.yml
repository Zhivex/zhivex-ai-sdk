name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: npm dist-tag to publish
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next

permissions: {}

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    outputs:
      release_tags: ${{ steps.release_tags.outputs.tags }}

    steps:
      - name: Checkout immutable release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.7

      - name: Verify npm supports trusted publishing
        run: >-
          node -e 'const { execFileSync } = require("node:child_process"); const version = execFileSync("npm", ["--version"], { encoding: "utf8" }).trim(); const [major, minor] = version.split(".").map(Number); if (major < 11 || (major === 11 && minor < 5)) throw new Error(`npm ${version} does not support trusted publishing; require >=11.5.1`);'

      - name: Install dependencies without lifecycle scripts
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Audit dependencies
        run: bun audit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Snapshot existing package tags
        shell: bash
        run: |
          export LC_ALL=C
          git tag --list | sort > "$RUNNER_TEMP/tags-before"

      - name: Publish stable packages with OIDC
        if: inputs.channel == 'latest'
        run: bun run release

      - name: Publish prerelease packages with OIDC
        if: inputs.channel == 'next'
        run: bun run release:next

      - name: Collect new package tags
        id: release_tags
        shell: bash
        run: |
          export LC_ALL=C
          new_tags="$(comm -13 "$RUNNER_TEMP/tags-before" <(git tag --list | sort))"

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            if [[ ! "$tag" =~ ^@zhivex-ai/[a-z0-9][a-z0-9-]*@[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "Unexpected release tag generated by Changesets: $tag" >&2
              exit 1
            fi
          done <<< "$new_tags"

          {
            echo 'tags<<RELEASE_TAGS_EOF'
            printf '%s\n' "$new_tags"
            echo 'RELEASE_TAGS_EOF'
          } >> "$GITHUB_OUTPUT"

  push_tags:
    name: Push verified release tags
    needs: publish
    if: needs.publish.result == 'success' && needs.publish.outputs.release_tags != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout published source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate and push only published package tags
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAGS: ${{ needs.publish.outputs.release_tags }}
        run: |
          set -euo pipefail

          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            if [[ ! "$tag" =~ ^(@zhivex-ai/[a-z0-9][a-z0-9-]*)@([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)$ ]]; then
              echo "Refusing unexpected release tag: $tag" >&2
              exit 1
            fi

            package_name="${BASH_REMATCH[1]}"
            package_version="${BASH_REMATCH[2]}"
            manifest_version="$(
              for manifest in packages/*/package.json; do
                jq -r --arg name "$package_name" 'select(.name == $name) | .version' "$manifest"
              done
            )"

            if [ "$manifest_version" != "$package_version" ]; then
              echo "Tag $tag does not match a committed package manifest." >&2
              exit 1
            fi

            remote_sha="$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')"
            if [ -n "$remote_sha" ] && [ "$remote_sha" != "$GITHUB_SHA" ]; then
              echo "Tag $tag already exists at a different commit." >&2
              exit 1
            fi
          done <<< "$RELEASE_TAGS"

          gh auth setup-git
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            remote_sha="$(git ls-remote --tags origin "refs/tags/$tag" | awk '{print $1}')"
            if [ "$remote_sha" = "$GITHUB_SHA" ]; then
              continue
            fi
            git tag "$tag" "$GITHUB_SHA"
            git push origin "refs/tags/$tag:refs/tags/$tag"
          done <<< "$RELEASE_TAGS"
